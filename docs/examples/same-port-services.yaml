# Demo: three independent services that all expose containerPort 8080.
# Used by docs/multiple-services-same-port.md.
apiVersion: v1
kind: List
items:
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: svc-a
    labels: {app: svc-a}
  spec:
    replicas: 1
    selector: {matchLabels: {app: svc-a}}
    template:
      metadata: {labels: {app: svc-a}}
      spec:
        containers:
        - name: http-echo
          image: hashicorp/http-echo
          args: ["-listen=:8080", "-text=response from svc-a"]
          ports: [{containerPort: 8080}]
- apiVersion: v1
  kind: Service
  metadata: {name: svc-a}
  spec:
    selector: {app: svc-a}
    ports: [{port: 8080, targetPort: 8080}]
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: svc-b
    labels: {app: svc-b}
  spec:
    replicas: 1
    selector: {matchLabels: {app: svc-b}}
    template:
      metadata: {labels: {app: svc-b}}
      spec:
        containers:
        - name: http-echo
          image: hashicorp/http-echo
          args: ["-listen=:8080", "-text=response from svc-b"]
          ports: [{containerPort: 8080}]
- apiVersion: v1
  kind: Service
  metadata: {name: svc-b}
  spec:
    selector: {app: svc-b}
    ports: [{port: 8080, targetPort: 8080}]
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: svc-c
    labels: {app: svc-c}
  spec:
    replicas: 1
    selector: {matchLabels: {app: svc-c}}
    template:
      metadata: {labels: {app: svc-c}}
      spec:
        containers:
        - name: http-echo
          image: hashicorp/http-echo
          args: ["-listen=:8080", "-text=response from svc-c"]
          ports: [{containerPort: 8080}]
- apiVersion: v1
  kind: Service
  metadata: {name: svc-c}
  spec:
    selector: {app: svc-c}
    ports: [{port: 8080, targetPort: 8080}]

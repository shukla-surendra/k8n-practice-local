apiVersion: v2
name: full-stack-app
description: >
  A full-featured, multi-tier demo Helm chart (frontend + backend + database)
  showcasing the breadth of common Kubernetes manifest kinds, meant to be
  installed and exercised entirely on a local cluster (minikube).
type: application
version: 1.0.0
appVersion: "1.0.0"
dependencies:
  - name: frontend
    version: "1.0.0"
    condition: frontend.enabled
  - name: backend
    version: "1.0.0"
    condition: backend.enabled
  - name: database
    version: "1.0.0"
    condition: database.enabled

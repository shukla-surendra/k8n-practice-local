{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "frontend.serviceAccountName" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
# nginx serves static files only — no Kubernetes API access needed, so we
# don't bother mounting a token (see automountServiceAccountToken below).
automountServiceAccountToken: false
{{- end }}

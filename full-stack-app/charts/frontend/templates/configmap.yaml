# Static index page for nginx, mounted as a volume in the Deployment below.
# Editing this and running `helm upgrade` rolls the pods automatically because
# the checksum annotation on the Deployment's pod template changes.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frontend.fullname" . }}-html
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
data:
  index.html: |
    <!DOCTYPE html>
    <html>
      <head><title>full-stack-app</title></head>
      <body style="font-family: sans-serif; margin: 4rem;">
        <h1>full-stack-app frontend</h1>
        <p>Served by release <strong>{{ .Release.Name }}</strong>, revision {{ .Release.Revision }}.</p>
        <p>Backend API: <a href="{{ .Values.apiPath }}/">{{ .Values.apiPath }}/</a></p>
      </body>
    </html>

# Runs once on first container start (postgres entrypoint executes any
# *.sql/*.sh dropped into /docker-entrypoint-initdb.d/).
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "database.fullname" . }}-init
  labels:
    {{- include "database.labels" . | nindent 4 }}
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS demo_items (
      id SERIAL PRIMARY KEY,
      name TEXT NOT NULL,
      created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "database.fullname" . }}
  labels:
    {{- include "database.labels" . | nindent 4 }}
type: Opaque
data:
  {{- /* `lookup` preserves the existing password across `helm upgrade`
         instead of generating (and breaking) a new one every time. Returns
         empty during `helm template`/`--dry-run`, where lookup can't reach
         a cluster — the `else` branch covers that too. */}}
  {{- $existing := (lookup "v1" "Secret" .Release.Namespace (include "database.fullname" .)) }}
  {{- if and $existing (not .Values.auth.password) }}
  postgres-password: {{ index $existing.data "postgres-password" }}
  {{- else if .Values.auth.password }}
  postgres-password: {{ .Values.auth.password | b64enc }}
  {{- else }}
  postgres-password: {{ randAlphaNum 24 | b64enc }}
  {{- end }}

# A backend-owned secret (e.g. an internal API token), separate from the
# database password which lives in the database subchart's own Secret and
# is referenced directly in deployment.yaml via secretKeyRef.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backend.fullname" . }}-token
  labels:
    {{- include "backend.labels" . | nindent 4 }}
type: Opaque
data:
  {{- /* Generated once on install; `lookup` keeps it stable across upgrades
         instead of rotating the token every `helm upgrade`. */}}
  {{- $existing := (lookup "v1" "Secret" .Release.Namespace (printf "%s-token" (include "backend.fullname" .))) }}
  {{- if $existing }}
  api-token: {{ index $existing.data "api-token" }}
  {{- else }}
  api-token: {{ randAlphaNum 32 | b64enc }}
  {{- end }}

{{- if .Values.networkPolicy.enabled }}
# Enforcement depends on the cluster's CNI plugin supporting NetworkPolicy
# (e.g. minikube --cni=calico). On plugins that don't enforce it, these
# objects still create fine — they're just advisory. See README.

# --- frontend: reachable from anywhere (it's the ingress entrypoint),
#     may only call out to the backend + DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app.kubernetes.io/part-of: full-stack-app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - {}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: backend
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.service.port }}
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# --- backend: only the frontend may call it; it may only call out to the
#     database + DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app.kubernetes.io/part-of: full-stack-app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: frontend
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.service.port }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: database
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.database.service.port }}
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# --- database: only the backend (and the migration/backup Jobs, which
#     share the backend's pod-selector label) may connect.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-database
  labels:
    app.kubernetes.io/part-of: full-stack-app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: database
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: backend
              app.kubernetes.io/instance: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: db-job
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.database.service.port }}
{{- end }}

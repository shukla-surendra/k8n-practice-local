{{- if .Values.backupCronJob.enabled }}
# Illustrative only: dumps to an emptyDir that vanishes with the pod. Point
# `volumes.backup` at a real PVC/object-store mount before relying on this.
# Trigger it on demand with:
#   kubectl create job --from=cronjob/<release>-db-backup manual-backup-1 -n <namespace>
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-db-backup
  labels:
    app.kubernetes.io/name: db-job
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: full-stack-app
spec:
  schedule: {{ .Values.backupCronJob.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: db-job
            app.kubernetes.io/instance: {{ .Release.Name }}
        spec:
          restartPolicy: Never
          containers:
            - name: backup
              image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
              env:
                - name: PGHOST
                  value: {{ .Release.Name }}-database
                - name: PGPORT
                  value: {{ .Values.database.service.port | quote }}
                - name: PGUSER
                  value: {{ .Values.database.auth.user | quote }}
                - name: PGDATABASE
                  value: {{ .Values.database.auth.database | quote }}
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-database
                      key: postgres-password
              command:
                - sh
                - -c
                - |
                  set -e
                  file=/backups/appdb-$(date +%Y%m%d-%H%M%S).sql
                  pg_dump > "$file"
                  echo "Wrote $file ($(wc -c < "$file") bytes)"
              volumeMounts:
                - name: backup
                  mountPath: /backups
          volumes:
            - name: backup
              emptyDir: {}
{{- end }}

# Default values — memory-bounded, CPU-unbounded. This is the profile that actually
# schedules on this repo's `minikube` cluster, whose node has zero free CPU already
# claimed by the existing Kubeflow/Istio/Knative stack (see docs/incidents.md,
# 2026-07-21). For a cluster with real CPU headroom, layer values-with-cpu-limits.yaml
# on top (see README.md) rather than editing this file.
loki-stack:
  loki:
    enabled: true
    isDefault: true
    persistence:
      enabled: false
    resources:
      requests:
        memory: 128Mi
      limits:
        memory: 256Mi

  # DaemonSet: one pod per node, tails container logs from every namespace
  promtail:
    enabled: true
    resources:
      requests:
        memory: 64Mi
      limits:
        memory: 128Mi
    # loki-stack's own default is `http://{{ .Release.Name }}:3100/loki/api/v1/push`,
    # which only resolves if the release is literally named "loki" — the Loki Service
    # this chart creates is actually named `<release>-loki`. With release name
    # "log-viewer" that default pushes to a nonexistent "log-viewer" host and silently
    # drops every log line (see docs/incidents.md, 2026-07-21). Pin it explicitly.
    config:
      clients:
        - url: http://log-viewer-loki:3100/loki/api/v1/push

  grafana:
    enabled: true
    adminPassword: admin
    sidecar:
      datasources:
        enabled: true
      # Watches for ConfigMaps labeled grafana_dashboard=1 in this namespace and
      # auto-loads them — see templates/dashboard-nginx-logs.yaml in this chart.
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
    service:
      type: NodePort
    resources:
      requests:
        memory: 128Mi
      limits:
        memory: 256Mi

  fluent-bit:
    enabled: false
  prometheus:
    enabled: false
  filebeat:
    enabled: false
  logstash:
    enabled: false

# Auto-loaded by Grafana's dashboard sidecar (grafana.sidecar.dashboards in values.yaml),
# which watches for ConfigMaps carrying the label below in this namespace. The `datasource`
# template variable (type: datasource, query: loki) means this works regardless of the
# Loki datasource's generated UID — no hardcoded UID to keep in sync.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-dashboard-nginx-logs
  labels:
    grafana_dashboard: "1"
data:
  nginx-logs.json: |
    {
      "title": "App Logs (sample-nginx)",
      "uid": "app-logs-nginx",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "loki",
            "hide": 0,
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "type": "logs",
          "title": "{app=\"nginx\"}",
          "gridPos": { "h": 16, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "loki", "uid": "$datasource" },
          "options": {
            "showTime": true,
            "wrapLogMessage": true,
            "sortOrder": "Descending"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "{app=\"nginx\"}",
              "datasource": { "type": "loki", "uid": "$datasource" }
            }
          ]
        }
      ]
    }

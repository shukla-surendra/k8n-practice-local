apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: local-demo-app
  template:
    metadata:
      labels:
        app: local-demo-app
    spec:
      containers:
        - name: local-demo-app
          image: local-demo-app:latest
          imagePullPolicy: Never   # image only exists inside minikube's docker daemon — never fetch from a registry
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          resources:
            requests:
              memory: 32Mi
            limits:
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: local-demo-app
spec:
  selector:
    app: local-demo-app
  ports:
    - port: 80
      targetPort: 8080

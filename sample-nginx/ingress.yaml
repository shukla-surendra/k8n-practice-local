apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-deployment
spec:
  ingressClassName: nginx
  rules:
  - host: sample-nginx.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-deployment
            port:
              number: 80
